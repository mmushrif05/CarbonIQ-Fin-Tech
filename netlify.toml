# CarbonIQ FinTech — Netlify Configuration

[build]
  command = "npm install"
  publish = "ui"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"
  # Keep firebase-admin as a real node_module rather than inlining it.
  # Its internal dynamic requires confuse nft's static tracer and can
  # cause "Cannot find module" crashes at function startup.
  external_node_modules = ["firebase-admin", "@firebase/app", "@google-cloud/storage"]

[functions."fintech-api"]
  # Increase timeout to 26s (Netlify Pro max) to give the Claude Haiku call
  # enough time even under cold-start conditions. Free plan is capped at 10s.
  timeout = 26

# Route API calls to the Express serverless function
# IMPORTANT: :splat captures everything after the prefix, so we must include
# the /v1/ segment in the destination so Express receives the correct path.
[[redirects]]
  from = "/v1/*"
  to = "/.netlify/functions/fintech-api/v1/:splat"
  status = 200

[[redirects]]
  from = "/bank/*"
  to = "/.netlify/functions/fintech-api/v1/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/fintech-api/health"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/fintech-api/v1/:splat"
  status = 200

# SPA fallback — serve index.html for all unmatched frontend routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_ENV = "production"
  FINTECH_API_ENABLED = "true"
  FF_COVENANT_ENGINE = "true"
  FF_PORTFOLIO_AGGREGATION = "true"
  FF_TAXONOMY_CHECKER = "true"
  FF_CERTIFICATE_GENERATION = "false"
  FF_INSURANCE_OUTPUT = "false"
  PCAF_VERSION = "3.0"
  PCAF_DEFAULT_ATTRIBUTION = "1.0"
  TAXONOMY_ASEAN_VERSION = "3"
  TAXONOMY_EU_VERSION = "2024"
  TAXONOMY_HK_VERSION = "2024"
  WEBHOOK_TIMEOUT_MS = "5000"
  WEBHOOK_MAX_RETRIES = "3"
  LOG_LEVEL = "info"
  LOG_VERBOSE = "false"

[context.deploy-preview.environment]
  NODE_ENV = "staging"
  FINTECH_API_ENABLED = "true"
