# CarbonIQ FinTech — Netlify Configuration

[build]
  command = "npm install"
  publish = "ui"
  functions = "netlify/functions"

[functions]
  node_bundler = "nft"

# Route API calls to the Express serverless function
# IMPORTANT: :splat captures everything after the prefix, so we must include
# the /v1/ segment in the destination so Express receives the correct path.
[[redirects]]
  from = "/v1/*"
  to = "/.netlify/functions/fintech-api/v1/:splat"
  status = 200

[[redirects]]
  from = "/bank/*"
  to = "/.netlify/functions/fintech-api/v1/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/fintech-api/health"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/fintech-api/v1/:splat"
  status = 200

# SPA fallback — serve index.html for all unmatched frontend routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "staging"
