# CarbonIQ FinTech — Netlify Configuration

[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Route all /v1/* and /bank/* to the Express API
[[redirects]]
  from = "/v1/*"
  to = "/.netlify/functions/fintech-api/:splat"
  status = 200

[[redirects]]
  from = "/bank/*"
  to = "/.netlify/functions/fintech-api/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/fintech-api/health"
  status = 200

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "staging"
