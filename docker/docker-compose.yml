# CarbonIQ FinTech — Local Development Stack
#
# Usage:
#   docker-compose -f docker/docker-compose.yml up
#
# Services:
#   fintech-api    — Express API on port 3001
#   firebase-emu   — Firebase emulator on ports 9000 (DB), 9099 (Auth), 4000 (UI)

services:
  fintech-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
      - FIREBASE_DATABASE_URL=http://firebase-emu:9000
    depends_on:
      firebase-emu:
        condition: service_healthy
    volumes:
      - ..:/app
      - /app/node_modules
    command: ["node", "--watch", "server.js"]

  firebase-emu:
    image: andreysenov/firebase-tools:latest
    ports:
      - "9000:9000"   # Realtime Database
      - "9099:9099"   # Authentication
      - "4000:4000"   # Emulator UI
    command: >
      firebase emulators:start
      --only auth,database
      --project carboniq-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
